version: "3.8"

services:
  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env before running}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - DB_PATH=/data/company-os.db
      - PORT=3001
      - LLM_API_URL=${LLM_API_URL:-https://api.openai.com/v1/chat/completions}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4}
    volumes:
      - db-data:/data
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - server
    restart: unless-stopped

volumes:
  db-data:
